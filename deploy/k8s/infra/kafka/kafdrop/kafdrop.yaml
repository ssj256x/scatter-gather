apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafdrop
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafdrop
  template:
    metadata:
      labels:
        app: kafdrop
    spec:
      containers:
        - name: kafdrop
          image: obsidiandynamics/kafdrop:latest
          ports:
            - containerPort: 9000
          env:
            - name: KAFKA_BROKERCONNECT
              value: "scatter-gather-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: JVM_OPTS
              value: "-XX:+UseSerialGC"
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: kafdrop
  namespace: kafka
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: kafdrop
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafdrop-url
  namespace: kafka
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: kafdrop.192.168.1.13.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafdrop
                port:
                  number: 9000