apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: scatter-gather-cluster
  namespace: kafka
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.message.format.version: "4.2"
    jvmOptions:
      "-XX":
        UseSerialGC: "true" # Cuts thread allocation overhead instantly
  entityOperator: # Manages Topics and Users automatically via K8s YAML
    topicOperator: {}
    userOperator: {}